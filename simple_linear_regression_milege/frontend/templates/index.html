<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Predictor</title>
</head>
<script>
    function sendData() {
        var fd = new FormData(document.querySelector('form'));
        var xhr = new XMLHttpRequest()
        xhr.open('POST', '/predict', true)
        xhr.onreadystatechange = function () {
            if (xhr.readyState == XMLHttpRequest.DONE) {
                document.getElementById('Miles').value = xhr.responseText
            }
        }
        xhr.onload = function () { }
        xhr.send(fd);
    }
</script>

<body>
    <div class="container ">
        <div class="row justify-content-center mt-5">
            <div class="col col-5 border">
                <form>
                    <h4 class="text-center text-danger">Welcome to Milage Predictor</h4>
                    <div>
                        <label class="form-label">Enter Weight:</label>
                        <input type="text" name="Weight" class="form-control">
                    </div>
                    <div class="text-center mt-3">
                        <input type="button" class="btn btn-primary mt-2 mb-2" value="Predict Miles"
                            onclick="sendData()">
                    </div>
                    <div>
                        <label class="form-label">Miles</label>
                        <input type="text" id="Miles" class="form-control">
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>

</html>
