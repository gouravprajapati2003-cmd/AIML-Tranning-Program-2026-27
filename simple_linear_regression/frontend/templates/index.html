<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Package Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script>
function sendData() {
    var fd = new FormData(document.querySelector("form"));

    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/predict");

    xhr.onreadystatechange = function () {
        if (xhr.readyState == XMLHttpRequest.DONE) {
            document.getElementById("pr").value = xhr.responseText;
        }
    }

    xhr.send(fd);
}
</script>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-6 border p-4">

            <h3 class="text-center text-primary">
                Placement Package Prediction
            </h3>

            <form>

                <label class="form-label">Enter CGPA</label>

                <input
                    type="text"
                    step="0.01"
                    class="form-control"
                    name="cgpa"
                    required>

                <div class="text-center mt-3">
    <input
        type="button"
        class="btn btn-primary"
        value="Predict Package"
        onclick="sendData()">
</div>

            </form>

            <div class="mt-4">
           <label class="form-label fw-bold">Predicted Package</label>
           <input type="text" id="pr" class="form-control" readonly>
           </div>

        </div>
    </div>
</div>

</body>
</html>
